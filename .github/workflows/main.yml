name: 
  docker deploy

on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: "Clean workspace"
        run: sudo rm -rf $GITHUB_WORKSPACE/*

      - name: "Code checkout"
        uses: actions/checkout@v7.0.0

      - name: "Stop Caddy"
        run: caddy stop
        continue-on-error: true


      - name: "Start Caddy"
        run: sudo caddy start
    
