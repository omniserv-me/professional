name: 
  docker deploy

on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: "Clean workspace"
        run: sudo rm -rf $GITHUB_WORKSPACE/*

      - name: "Code checkout"
        run: actions/checkout

      - name: "Stop Caddy"
        run: caddy stop

      - name: "Start Caddy"
        run: caddy start
    
